<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Room Reservation System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="dashboard-header">
            <div>
                <h1>Hotel Reservation System</h1>
                <p>Travel Time Optimization Engine</p>
            </div>
            <div class="legend">
                <div class="legend-item"><div class="legend-box available"></div> Available</div>
                <div class="legend-item"><div class="legend-box booked"></div> Occupied</div>
                <div class="legend-item"><div class="legend-box newly-booked"></div> New Booking</div>
            </div>
        </header>

        <div class="panel controls-wrapper">
            <div class="input-section">
                <label for="room-count">Rooms to Book (1-5):</label>
                <input type="number" id="room-count" min="1" max="5" value="1">
            </div>
            <div class="action-buttons">
                <button id="btn-book" class="btn-book">Allocate Rooms</button>
                <button id="btn-random" class="btn-outline">Simulate Occupancy</button>
                <button id="btn-reset" class="btn-outline">Clear All</button>
            </div>
        </div>

        <div class="panel log-container" id="log-output">
            System ready. Awaiting booking request.
        </div>

        <div class="panel">
            <div id="hotel-grid" class="hotel-layout">
                <!-- Floors will be generated here by JS -->
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
